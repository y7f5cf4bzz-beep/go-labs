<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Информационная система</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="container">
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="$('#workspace').load('/public/html/student.html');">Студент</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">Активность</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#" onclick="$('#workspace').load('/public/html/scientificactivity/conference.html');">Конференции</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="$('#workspace').load('/public/html/report/report.html');">Отчеты</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="$('#workspace').load('/public/html/chart/chartbasicbar.html');">Графики</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"><b>{{.Displayname}}</b></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">{{.Date}}</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/logout">Выйти</a>
                    </li>
                </ul>
            </div>
        </nav>
        <div id="workspace" style="margin-top:20px; min-height:500px;">
            <h3>Добро пожаловать в информационную систему</h3>
            <p>Выберите раздел из меню для работы.</p>
        </div>
    </div>
    <div id="floatstudentinfo" style="position:fixed; top:10px; right:10px; background:#fff; border:1px solid #ccc; padding:5px; border-radius:5px;"></div>
    <input type="hidden" id="floatstudentid" value="">
    <div id="dwait" title="Сообщение" style="display:none;"><p>Ждите...</p></div>
    <script>
        $(function() {
            $("#dwait").dialog({ autoOpen: false, modal: true, width: 200 });
            $("#dwait").dialog('widget').find(".ui-dialog-titlebar-close").hide();
            $('.dropdown-toggle').dropdown();
        });
    </script>
</body>
</html>
